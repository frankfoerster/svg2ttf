name: Tests

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    name: "Test"
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version:
          - 22.22.2
          - 24.14.1
          - 25.9.0

    steps:
      - name: "Checkout"
        uses: actions/checkout@v4

      - name: "Setup Node.js ${{ matrix.node-version }}"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: "Install dependencies"
        run: npm install

      - name: "Run tests"
        run: npm run test
